plugins {
    id 'com.android.application'
}

android {
    namespace 'com.tencentbyd.karaokecar'
    compileSdk 35

    defaultConfig {
        applicationId 'com.tencentbyd.karaokecar'
        minSdk 29
        targetSdk 32
        versionCode 10
        versionName '1.0-experimental'
    }

    buildTypes {
        debug {
            applicationIdSuffix ''
            versionNameSuffix '-debug'
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
